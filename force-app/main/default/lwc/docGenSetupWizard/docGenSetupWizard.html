<template>
    <lightning-card title="DocGen Setup" icon-name="custom:custom108">
        <div class="slds-p-around_medium">
            <template if:false={isLoaded}>
                <div class="slds-is-relative" style="height: 100px;">
                    <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
                </div>
            </template>

            <template if:true={isLoaded}>
                <div class="slds-box slds-theme_default">
                    <div class="slds-form-element slds-m-bottom_medium">
                        <lightning-input
                            type="url"
                            label="Experience Site URL (with page path)"
                            placeholder="https://yoursite.com/s/sign"
                            value={experienceSiteUrl}
                            onchange={handleUrlChange}
                            required>
                        </lightning-input>
                        <p class="slds-text-body_small slds-m-top_xx-small">Example: https://docgen-portal.my.site.com/s/sign-document</p>
                    </div>

                    <lightning-button variant="brand" label="Save Settings" onclick={handleSaveSettings}></lightning-button>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
