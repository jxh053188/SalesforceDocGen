<template>
    <!-- BUILDER MODE -->
    <template if:false={showTagsOnly}>
        <lightning-card title="Visual Query Builder" icon-name="standard:search">
            <div class="slds-p-around_medium" onclick={handleOutsideClick}>
                <!-- 1. Object Search -->
                <div class="slds-box slds-m-bottom_medium slds-theme_shade">
                    <p class="slds-text-body_small">
                        <strong>Instructions:</strong> Select a base object, then pick the fields you want to include in
                        your document template.
                        You can also include fields from lookup fields or related child lists recursively.
                    </p>
                </div>

                <div class="slds-form-element slds-m-bottom_medium">
                    <label class="slds-form-element__label">Base Object</label>
                    <div class="slds-form-element__control slds-input-has-icon slds-input-has-icon_right">
                        <lightning-icon icon-name="utility:search" size="x-small"
                            class="slds-icon slds-input__icon slds-input__icon_right slds-icon-text-default"></lightning-icon>
                        <input type="search" class="slds-input" placeholder="Search objects..."
                            value={selectedObjectLabel} oninput={handleObjectSearch} onfocus={handleObjectFocus}>
                    </div>
                    <template if:true={showObjectDropdown}>
                        <div class="slds-dropdown slds-dropdown_length-5 slds-dropdown_fluid" role="listbox">
                            <ul class="slds-listbox slds-listbox_vertical" role="presentation">
                                <template for:each={filteredObjectOptions} for:item="opt">
                                    <li role="presentation" class="slds-listbox__item" key={opt.value}
                                        onclick={handleObjectSelect} data-value={opt.value} data-label={opt.label}>
                                        <div class="slds-media slds-listbox__option slds-listbox__option_plain slds-media_small"
                                            role="option">
                                            <span class="slds-truncate" title={opt.label}>{opt.label}</span>
                                        </div>
                                    </li>
                                </template>
                            </ul>
                        </div>
                    </template>
                </div>

                <!-- 2. Builder UI Recursive Tree -->
                <template if:true={rootNodeConfig}>
                    <div class="slds-grid slds-gutters">
                        <!-- Fields Config -->
                        <div class="slds-col slds-size_1-of-1">
                            <!-- Warnings -->
                            <template if:true={complexityWarning}>
                                <div class="slds-notify slds-notify_alert slds-alert_warning" role="alert">
                                    <span class="slds-assistive-text">warning</span>
                                    <span class="slds-icon_container slds-icon-utility-warning slds-m-right_x-small">
                                        <lightning-icon icon-name="utility:warning" variant="warning"
                                            size="x-small"></lightning-icon>
                                    </span>
                                    <h2>
                                        <strong>{complexityWarning.title}: </strong>
                                        <template for:each={complexityWarning.messages} for:item="msg">
                                            <span key={msg} class="slds-p-horizontal_xx-small">{msg}</span>
                                        </template>
                                    </h2>
                                </div>
                            </template>

                            <div class="slds-grid slds-grid_align-end slds-m-bottom_small">
                                <div class="slds-grid slds-grid_vertical-align-center">
                                    <lightning-input type="toggle" label="Show Selected Only" message-toggle-active=""
                                        message-toggle-inactive="" variant="label-hidden" class="slds-m-right_small"
                                        onchange={handleToggleSelectedOnly}>
                                    </lightning-input>
                                    <span class="slds-form-element__label slds-m-bottom_none">Selected Only Filter
                                        Active on All Fields</span>
                                </div>
                            </div>

                            <!-- ROOT QUERY NODE -->
                            <c-doc-gen-query-node node-config={rootNodeConfig} level="1" show-tags-only={showTagsOnly}
                                globals={globalState} onconfigchange={handleRootConfigChange}>
                            </c-doc-gen-query-node>
                        </div>
                    </div>

                    <!-- Generated Query Output (Builder Mode Only) -->
                    <div class="slds-m-top_medium slds-box slds-theme_default">
                        <h3 class="slds-text-heading_small slds-m-bottom_small">Generated Query Config</h3>
                        <div class="slds-text-font_monospace slds-p-around_small slds-theme_shade">{generatedQuery}
                        </div>
                    </div>
                </template>
            </div>
        </lightning-card>
    </template>

    <!-- VIEW/TAGS MODE -->
    <!-- (Retaining existing tag UI for brevity, binding to the recursive generatedTags function) -->
    <template if:true={showTagsOnly}>
        <div class="slds-p-around_medium">

            <!-- Tools Bar -->
            <div class="slds-grid slds-m-bottom_medium">
                <div class="slds-col slds-grow">
                    <lightning-input type="search" label="Search Tags" placeholder="Filter fields..."
                        onchange={handleTagsSearch} value={tagsSearchKey} variant="label-hidden">
                    </lightning-input>
                </div>
                <div class="slds-col slds-no-flex slds-m-left_small">
                    <lightning-button-icon icon-name="utility:refresh" onclick={refreshPreview}
                        alternative-text="Refresh Data" title="Refresh Data"
                        class="slds-m-right_x-small"></lightning-button-icon>
                    <lightning-button-stateful label-when-off="Show Raw Data" label-when-on="Hide Raw Data"
                        icon-name-when-off="utility:preview" icon-name-when-on="utility:hide" selected={showRawData}
                        onclick={handleToggleRawData}>
                    </lightning-button-stateful>
                </div>
            </div>

            <!-- Raw Data Preview -->
            <template if:true={showRawData}>
                <div class="slds-box slds-theme_shade slds-m-bottom_medium">
                    <h3 class="slds-text-heading_small slds-m-bottom_x-small">Raw Data Preview (JSON)</h3>
                    <div class="slds-scrollable_y" style="max-height: 300px;">
                        <pre>{rawPreviewJson}</pre>
                    </div>
                </div>
            </template>

            <div class="slds-box slds-theme_default">
                <!-- Headers -->
                <div
                    class="slds-grid slds-border_bottom slds-p-bottom_x-small slds-m-bottom_small slds-text-title_caps slds-text-color_weak">
                    <div class="slds-col slds-size_1-of-3">Field Label</div>
                    <div class="slds-col slds-size_1-of-3">Merge Tag</div>
                    <div class="slds-col slds-size_1-of-3">Sample Value</div>
                </div>

                <template if:true={generatedTags}>
                    <lightning-accordion allow-multiple-sections-open active-section-name={activeSections}>

                        <!-- Base Fields -->
                        <template if:true={generatedTags.hasBase}>
                            <lightning-accordion-section name="Base" label="Base Fields">
                                <div slot="actions">
                                    <lightning-button-icon icon-name="utility:copy" variant="border-filled"
                                        size="x-small" onclick={handleCopyTag} data-tag={generatedTags.baseCopyAll}
                                        title="Copy All Base Fields">
                                    </lightning-button-icon>
                                </div>
                                <template for:each={generatedTags.baseFields} for:item="tag">
                                    <div key={tag.code}
                                        class="slds-grid slds-p-vertical_xx-small border-bottom-dashed slds-grid_vertical-align-center">
                                        <div class="slds-col slds-size_1-of-3 slds-truncate" title={tag.label}>
                                            {tag.label}
                                        </div>
                                        <div class="slds-col slds-size_1-of-3">
                                            <div class="slds-grid slds-grid_vertical-align-center">
                                                <code
                                                    class="slds-box slds-box_xx-small slds-theme_shade slds-m-right_x-small"
                                                    style="user-select:all;">{tag.code}</code>
                                                <lightning-button-icon icon-name="utility:copy" variant="bare"
                                                    size="small" onclick={handleCopyTag}
                                                    data-tag={tag.code}></lightning-button-icon>
                                            </div>
                                        </div>
                                        <div class="slds-col slds-size_1-of-3 slds-truncate" title={tag.sample}>
                                            <template if:true={tag.sample}>
                                                <span class="slds-text-color_success">{tag.sample}</span>
                                            </template>
                                            <template if:false={tag.sample}>
                                                <span class="slds-text-color_weak slds-text-body_small">--</span>
                                            </template>
                                        </div>
                                    </div>
                                </template>
                            </lightning-accordion-section>
                        </template>

                        <!-- Parent Fields -->
                        <template if:true={generatedTags.hasParent}>
                            <template for:each={generatedTags.parentSections} for:item="section">
                                <lightning-accordion-section key={section.name} name={section.name}
                                    label={section.name}>
                                    <div slot="actions">
                                        <lightning-button-icon icon-name="utility:copy" variant="border-filled"
                                            size="x-small" onclick={handleCopyTag} data-tag={section.copyAllText}
                                            title="Copy All Section Fields">
                                        </lightning-button-icon>
                                    </div>
                                    <template for:each={section.fields} for:item="tag">
                                        <div key={tag.code}
                                            class="slds-grid slds-p-vertical_xx-small border-bottom-dashed slds-grid_vertical-align-center">
                                            <div class="slds-col slds-size_1-of-3 slds-truncate" title={tag.label}>
                                                {tag.label}</div>
                                            <div class="slds-col slds-size_1-of-3">
                                                <div class="slds-grid slds-grid_vertical-align-center">
                                                    <code
                                                        class="slds-box slds-box_xx-small slds-theme_shade slds-m-right_x-small"
                                                        style="user-select:all;">{tag.code}</code>
                                                    <lightning-button-icon icon-name="utility:copy" variant="bare"
                                                        size="small" onclick={handleCopyTag}
                                                        data-tag={tag.code}></lightning-button-icon>
                                                </div>
                                            </div>
                                            <div class="slds-col slds-size_1-of-3 slds-truncate" title={tag.sample}>
                                                <template if:true={tag.sample}>
                                                    <span class="slds-text-color_success">{tag.sample}</span>
                                                </template>
                                                <template if:false={tag.sample}>
                                                    <span class="slds-text-color_weak slds-text-body_small">--</span>
                                                </template>
                                            </div>
                                        </div>
                                    </template>
                                </lightning-accordion-section>
                            </template>
                        </template>

                        <!-- Children -->
                        <template if:true={generatedTags.hasChildren}>
                            <h3 class="slds-text-heading_small slds-m-top_medium slds-m-bottom_small slds-p-left_small">
                                Child Lists</h3>
                            <template for:each={generatedTags.children} for:item="child">
                                <lightning-accordion-section key={child.name} name={child.name} label={child.name}>
                                    <div slot="actions">
                                        <lightning-button-icon icon-name="utility:copy" variant="border-filled"
                                            size="x-small" onclick={handleCopyTag} data-tag={child.copyAllText}
                                            title="Copy Entire Loop Block">
                                        </lightning-button-icon>
                                    </div>

                                    <!-- Loop Start/End -->
                                    <div
                                        class="slds-grid slds-p-vertical_xx-small slds-theme_shade slds-p-horizontal_small slds-m-bottom_small slds-grid_vertical-align-center">
                                        <div class="slds-col slds-size_1-of-3"><strong>Loop Block</strong></div>
                                        <div class="slds-col slds-size_1-of-3">
                                            <code
                                                class="slds-box slds-box_xx-small slds-theme_default">{child.loopStart}</code>
                                            ... <code
                                                class="slds-box slds-box_xx-small slds-theme_default">{child.loopEnd}</code>
                                        </div>
                                        <div class="slds-col slds-size_1-of-3"></div>
                                    </div>

                                    <!-- Child Fields -->
                                    <template for:each={child.fields} for:item="f">
                                        <div key={f.code}
                                            class="slds-grid slds-p-vertical_xx-small slds-m-left_small border-bottom-dashed slds-grid_vertical-align-center">
                                            <div class="slds-col slds-size_1-of-3 slds-truncate" title={f.label}>
                                                {f.label}
                                            </div>
                                            <div class="slds-col slds-size_1-of-3">
                                                <div class="slds-grid slds-grid_vertical-align-center">
                                                    <code
                                                        class="slds-box slds-box_xx-small slds-theme_shade slds-m-right_x-small"
                                                        style="user-select:all;">{f.code}</code>
                                                    <lightning-button-icon icon-name="utility:copy" variant="bare"
                                                        size="small" onclick={handleCopyTag}
                                                        data-tag={f.code}></lightning-button-icon>
                                                </div>
                                            </div>
                                            <div class="slds-col slds-size_1-of-3 slds-truncate" title={f.sample}>
                                                <template if:true={f.sample}>
                                                    <span class="slds-text-color_success">{f.sample}</span>
                                                </template>
                                                <template if:false={f.sample}>
                                                    <span class="slds-text-color_weak slds-text-body_small">--</span>
                                                </template>
                                            </div>
                                        </div>
                                    </template>

                                    <!-- Nested Children (L3+) -->
                                    <template if:true={child.hasNestedChildren}>
                                        <template for:each={child.nestedChildren} for:item="nested">
                                            <div key={nested.name}
                                                class="slds-m-top_x-small slds-m-left_small slds-box slds-box_x-small slds-theme_shade">
                                                <div
                                                    class="slds-grid slds-p-vertical_xx-small slds-p-horizontal_small slds-m-bottom_x-small slds-grid_vertical-align-center">
                                                    <div class="slds-col slds-grow"><strong>{nested.name}</strong></div>
                                                    <div class="slds-col slds-no-flex">
                                                        <code
                                                            class="slds-box slds-box_xx-small slds-theme_default slds-m-right_x-small">{nested.loopStart}</code>
                                                        ...
                                                        <code
                                                            class="slds-box slds-box_xx-small slds-theme_default">{nested.loopEnd}</code>
                                                        <lightning-button-icon icon-name="utility:copy" variant="bare"
                                                            size="small" onclick={handleCopyTag}
                                                            data-tag={nested.copyAllText}
                                                            title="Copy nested loop block"></lightning-button-icon>
                                                    </div>
                                                </div>
                                                <template for:each={nested.fields} for:item="nf">
                                                    <div key={nf.code}
                                                        class="slds-grid slds-p-vertical_xx-small slds-m-left_small border-bottom-dashed slds-grid_vertical-align-center">
                                                        <div class="slds-col slds-size_1-of-3 slds-truncate"
                                                            title={nf.label}>{nf.label}</div>
                                                        <div class="slds-col slds-size_1-of-3">
                                                            <div class="slds-grid slds-grid_vertical-align-center">
                                                                <code
                                                                    class="slds-box slds-box_xx-small slds-theme_shade slds-m-right_x-small"
                                                                    style="user-select:all;">{nf.code}</code>
                                                                <lightning-button-icon icon-name="utility:copy"
                                                                    variant="bare" size="small" onclick={handleCopyTag}
                                                                    data-tag={nf.code}></lightning-button-icon>
                                                            </div>
                                                        </div>
                                                        <div class="slds-col slds-size_1-of-3 slds-truncate"
                                                            title={nf.sample}>
                                                            <template if:true={nf.sample}>
                                                                <span class="slds-text-color_success">{nf.sample}</span>
                                                            </template>
                                                            <template if:false={nf.sample}>
                                                                <span
                                                                    class="slds-text-color_weak slds-text-body_small">--</span>
                                                            </template>
                                                        </div>
                                                    </div>
                                                </template>
                                            </div>
                                        </template>
                                    </template>
                                </lightning-accordion-section>
                            </template>
                        </template>
                    </lightning-accordion>
                </template>
            </div>
        </div>
    </template>
</template>
